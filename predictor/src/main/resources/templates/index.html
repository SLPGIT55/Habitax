<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitax | Luxury Real Estate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; color: #2d3436; font-family: 'Segoe UI', sans-serif; }
        .logo-habitax { color: #ff6b10; font-family: 'Times New Roman', serif; font-weight: bold; font-size: 3.5rem; }
        .text-orange { color: #ff6b10 !important; }
        .btn-orange { background-color: #ff6b10; color: white; border: none; transition: 0.3s; border-radius: 50px; }
        .btn-orange:hover { background-color: #e65a00; color: white; transform: translateY(-2px); }
        .main-card { background: white; border-radius: 30px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.05); padding: 2.5rem; }
        .building-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .building-card img { width: 100%; height: 180px; object-fit: cover; }
        .price-tag { color: #ff6b10; font-weight: bold; font-size: 1.1rem; }
        .segment-card { background: white; border: 1px solid #eee; border-radius: 20px; padding: 20px; text-align: center; transition: all 0.3s ease; }
        .card-oportunidad { border-bottom: 4px solid #198754; }
        .card-medio { border: 2px solid #ff6b10; border-bottom: 5px solid #ff6b10; }
        .card-premium { border-bottom: 4px solid #2d3436; }
        .history-list-item { background: #fff; border-radius: 12px; padding: 12px 20px; margin-bottom: 10px; border-left: 5px solid #ff6b10; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container-fluid py-5 px-5">
    <div class="row align-items-start">
        <div class="col-lg-3 d-none d-lg-block">
            <div class="building-card shadow-sm">
                <img src="https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=400&q=80">
                <div class="p-3"><h6>Residencial SkyLine</h6><div class="price-tag">360.000 €</div></div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="text-center mb-4">
                <h1 class="logo-habitax">HABITAX</h1>
                <p class="text-muted fw-bold">HOLA, <span th:text="${nombreUsuario}" class="text-orange">Sandra</span> 
                <a href="/perfil" class="ms-2 btn btn-sm btn-outline-dark rounded-pill">Mi Perfil</a></p>
            </div>

            <div class="main-card">
                <form th:action="@{/predecir}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="small fw-bold">PROVINCIA</label>
                            <select name="provincia" id="provincia" class="form-select rounded-pill" required>
                                <option value="">Selecciona...</option>
                                <option th:each="p : ${provincias}" th:value="${p}" th:text="${p}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold">ZONA</label>
                            <select name="zona" id="zona" class="form-select rounded-pill" required>
                                <option value="">Primero selecciona provincia</option>
                            </select>
                        </div>
                        <div class="col-md-4"><input type="number" name="metros" class="form-control rounded-pill" placeholder="m²" required></div>
                        <div class="col-md-4"><input type="number" name="habitaciones" class="form-control rounded-pill" placeholder="Hab."></div>
                        <div class="col-md-4"><input type="number" name="banos" class="form-control rounded-pill" placeholder="Baños"></div>
                    </div>
                    <button type="submit" class="btn btn-orange w-100 mt-4 py-3 fw-bold">ANALIZAR MERCADO</button>
                </form>

                <div th:if="${resultado != null}" class="mt-5">
                    <div class="row g-3 mb-4">
                        <div class="col-md-4" th:if="${precioBarato != null}">
                            <div class="segment-card card-oportunidad">
                                <small class="text-success fw-bold">OPORTUNIDAD</small>
                                <div class="fs-5 fw-bold" th:text="${#numbers.formatDecimal(precioBarato, 0, 'POINT', 0, 'COMMA')} + ' €'"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="segment-card card-medio">
                                <small class="text-orange fw-bold">PRECIO MEDIO</small>
                                <div class="fs-5 fw-bold" th:text="${#numbers.formatDecimal(resultado, 0, 'POINT', 0, 'COMMA')} + ' €'"></div>
                            </div>
                        </div>
                        <div class="col-md-4" th:if="${precioPremium != null}">
                            <div class="segment-card card-premium">
                                <small class="text-dark fw-bold">PREMIUM</small>
                                <div class="fs-5 fw-bold" th:text="${#numbers.formatDecimal(precioPremium, 0, 'POINT', 0, 'COMMA')} + ' €'"></div>
                            </div>
                        </div>
                    </div>
                    
                    <form th:action="@{/favoritos/guardar}" method="post" class="text-center">
                        <input type="hidden" name="zona" th:value="${zonaSeleccionada}">
                        <input type="hidden" name="metros" th:value="${metrosIngresados}">
                        <input type="hidden" name="precio" th:value="${resultado}">
                        <input type="hidden" name="habitaciones" th:value="${habitacionesIngresadas}">
                        <input type="hidden" name="banos" th:value="${banosIngresados}">
                        <input type="hidden" name="barrio" th:value="${zonaSeleccionada}">
                        <button class="btn btn-dark rounded-pill px-5">GUARDAR FAVORITO</button>
                    </form>
                </div>

                <div class="mt-5" th:if="${historial != null and not #lists.isEmpty(historial)}">
                    <h6 class="text-muted fw-bold mb-3 small">ÚLTIMAS CONSULTAS</h6>
                    <div th:each="h : ${historial}" class="history-list-item shadow-sm">
                        <span class="fw-bold" th:text="${h.zona}"></span>
                        <span class="text-orange fw-bold" th:text="${#numbers.formatDecimal(h.precio, 0, 'POINT', 0, 'COMMA')} + ' €'"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-3 d-none d-lg-block text-end">
            <a href="/logout" class="btn btn-dark btn-sm rounded-pill mb-4">Cerrar Sesión</a>
            <div class="building-card shadow-sm text-start">
                <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400&q=80">
                <div class="p-3"><h6>Villa Mediterranean</h6><div class="price-tag">240.000 €</div></div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('provincia').addEventListener('change', function() {
        fetch('/api/zonas?provincia=' + encodeURIComponent(this.value))
            .then(res => res.json())
            .then(data => {
                const s = document.getElementById('zona');
                s.innerHTML = '<option value="">Selecciona Zona...</option>';
                data.forEach(z => s.innerHTML += `<option value="${z}">${z}</option>`);
            });
    });
</script>
</body>
</html>
