<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitax | Luxury Real Estate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; color: #2d3436; font-family: 'Segoe UI', sans-serif; }
        .logo-habitax { color: #ff6b10; font-family: 'Times New Roman', serif; font-weight: bold; font-size: 3.5rem; }
        .text-orange { color: #ff6b10 !important; }
        
        /* Estilo para las fotos de edificios laterales */
        .building-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .building-card img { width: 100%; height: 260px; object-fit: cover; }
        .building-info { padding: 15px; text-align: center; }
        .price-tag { color: #ff6b10; font-weight: bold; font-size: 1.3rem; }

        .main-card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-control { border: 2px solid #eee; border-radius: 10px; padding: 10px; }
        .btn-predict { background: #ff6b10; color: white; font-weight: bold; border-radius: 10px; padding: 12px; border: none; width: 100%; }
        .btn-predict:hover { background: #e65a00; }
        
        .history-section { background: white; border-radius: 20px; padding: 2rem; margin-top: 2rem; }
        .badge-feature { background: #f8f9fa; padding: 4px 8px; border-radius: 6px; font-size: 0.85rem; margin-right: 5px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container-fluid py-5 px-5">
    <div class="row">
        
        <div class="col-lg-3 d-none d-lg-block">
            <div class="building-card">
                <img src="https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=400&q=80" alt="Edificio A">
                <div class="building-info">
                    <h6>Residencial SkyLine</h6>
                    <p class="small text-muted mb-1">Zona Premium</p>
                    <div class="price-tag">
                        <span th:text="${resultado != null ? #numbers.formatDecimal(resultado * 1.2, 0, 'POINT', 0, 'COMMA') : '360.000'}"></span> €
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="text-center mb-5">
                <h1 class="logo-habitax">HABITAX</h1>
                <p class="text-muted fw-bold">HOLA, <span th:text="${nombreUsuario}" class="text-orange">Sandra</span> <i class="fa-solid fa-circle-check text-success"></i></p>
            </div>

            <div class="main-card">
                <form th:action="@{/predecir}" method="post">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Ubicación</label>
                            <input type="text" name="zona" class="form-control" placeholder="Madrid" th:value="${zonaSeleccionada}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Metros (m²)</label>
                            <input type="number" name="metros" class="form-control" placeholder="80" th:value="${metrosIngresados}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Habitaciones</label>
                            <input type="number" name="habitaciones" class="form-control" th:value="${habitaciones != null ? habitaciones : 1}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Baños</label>
                            <input type="number" name="banos" class="form-control" th:value="${banos != null ? banos : 1}" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-predict mt-4 shadow-sm">ANALIZAR MERCADO</button>
                </form>

                <div th:if="${resultado != null}" class="mt-4 p-4 border border-warning rounded-4 bg-light text-center">
                    <p class="text-muted mb-1 small fw-bold">VALOR ESTIMADO</p>
                    <h1 class="text-orange fw-bold mb-0">
                        <span th:text="${#numbers.formatDecimal(resultado, 0, 'POINT', 0, 'COMMA')}"></span> €
                    </h1>
                </div>
            </div>

            <div class="history-section" th:if="${not #lists.isEmpty(historial)}">
                <h6 class="fw-bold mb-4 text-orange text-uppercase" style="letter-spacing: 1px;">Historial Reciente</h6>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead><tr class="small text-muted"><th>Zona</th><th>Detalles</th><th class="text-end">Precio</th></tr></thead>
                        <tbody>
                            <tr th:each="p : ${historial}">
                                <td th:text="${p.zona}" class="fw-bold"></td>
                                <td>
                                    <span class="badge-feature" th:text="${p.metros}+'m²'"></span>
                                    <span class="badge-feature" th:text="${p.habitaciones}+'H'"></span>
                                    <span class="badge-feature" th:text="${p.banos}+'B'"></span>
                                </td>
                                <td class="text-end fw-bold text-orange">
                                    <span th:text="${#numbers.formatDecimal(p.precio, 0, 'POINT', 0, 'COMMA')}"></span> €
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-3 d-none d-lg-block">
            <div class="text-end mb-3">
                <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill px-4 fw-bold">
                    Cerrar Sesión <i class="fa-solid fa-right-from-bracket ms-1"></i>
                </a>
            </div>

            <div class="building-card">
                <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400&q=80" alt="Edificio B">
                <div class="building-info">
                    <h6>Villa Mediterranean</h6>
                    <p class="small text-muted mb-1">Nueva Construcción</p>
                    <div class="price-tag">
                        <span th:text="${resultado != null ? #numbers.formatDecimal(resultado * 0.8, 0, 'POINT', 0, 'COMMA') : '240.000'}"></span> €
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
