<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitax | Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: #f4f7f6; 
            color: #2d3436; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh; 
        }

        /* Logo Estilo Habitax */
        .logo-habitax {
            color: #ff6b10; 
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            font-size: 3rem;
            margin-bottom: 0;
        }

        .text-orange { color: #ff6b10 !important; }

        .main-card { 
            background: #ffffff; 
            border: none;
            border-radius: 20px; 
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .form-label { font-weight: 600; color: #636e72; }
        
        .form-control { 
            border: 2px solid #eee; 
            border-radius: 10px;
            padding: 12px;
        }

        .form-control:focus {
            border-color: #ff6b10;
            box-shadow: none;
        }

        .btn-predict { 
            background: #ff6b10; 
            border: none; 
            font-weight: 700; 
            border-radius: 10px; 
            padding: 1rem;
            transition: 0.3s;
        }

        .btn-predict:hover {
            background: #e65a00;
            transform: translateY(-2px);
        }

        .result-box { 
            background: #fff9f4; 
            border: 2px dashed #ff6b10; 
            border-radius: 15px; 
            padding: 1.5rem; 
            margin-top: 2rem; 
        }

        .history-section {
            background: #ffffff;
            border-radius: 20px;
            padding: 2rem;
            margin-top: 2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .table thead { background: #ff6b10; color: white; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h1 class="logo-habitax">HABITAX</h1>
                    <p class="text-muted small fw-bold mb-0">
                        HOLA, <span th:text="${nombreUsuario}" class="text-orange">INVITADO</span> 
                        <i class="fa-solid fa-circle-check text-success ms-1"></i>
                    </p>
                </div>
                <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill px-4">
                    Cerrar sesión <i class="fa-solid fa-right-from-bracket ms-1"></i>
                </a>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <div class="main-card mb-4">
                        <h5 class="fw-bold mb-4">Calculadora de Mercado</h5>
                        <form th:action="@{/predecir}" method="post">
                            <div class="row">
                                <div class="col-md-7 mb-3">
                                    <label class="form-label">Ubicación</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="fa-solid fa-location-dot text-orange"></i></span>
                                        <input type="text" name="zona" class="form-control" placeholder="Ej: Madrid" th:value="${zonaSeleccionada}" required>
                                    </div>
                                </div>
                                <div class="col-md-5 mb-3">
                                    <label class="form-label">Metros (m²)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="fa-solid fa-ruler-combined text-orange"></i></span>
                                        <input type="number" name="metros" class="form-control" placeholder="80" th:value="${metrosIngresados}" required>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-predict w-100 text-white mt-3">
                                PREDECIR VALOR AHORA <i class="fa-solid fa-wand-magic-sparkles ms-2"></i>
                            </button>
                        </form>

                        <div th:if="${resultado != null}" class="result-box text-center animate__animated animate__fadeIn">
                            <p class="text-muted mb-1 fw-bold">VALOR ESTIMADO</p>
                            <h2 class="display-5 fw-bold text-orange">
                                <span th:text="${#numbers.formatDecimal(resultado, 0, 'POINT', 0, 'COMMA')}"></span> €
                            </h2>
                            <small class="text-muted">Análisis para <span th:text="${metrosIngresados}"></span> m² en <span th:text="${zonaSeleccionada}"></span></small>
                        </div>

                        <div th:if="${error}" class="mt-3 text-center text-danger small">
                            <i class="fa-solid fa-circle-info me-1"></i> <span th:text="${error}"></span>
                        </div>
                    </div>
                </div>

                <div class="col-md-12">
                    <div class="history-section" th:if="${not #lists.isEmpty(historial)}">
                        <h5 class="fw-bold mb-4"><i class="fa-solid fa-clock-rotate-left me-2 text-orange"></i> Actividad Reciente</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th class="border-0 rounded-start">Zona</th>
                                        <th class="border-0">Superficie</th>
                                        <th class="border-0 rounded-end text-end">Estimación</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="p : ${historial}">
                                        <td th:text="${p.zona}" class="fw-bold"></td>
                                        <td th:text="${p.metros} + ' m²'"></td>
                                        <td class="text-end fw-bold text-dark">
                                            <span th:text="${#numbers.formatDecimal(p.precio, 0, 'POINT', 0, 'COMMA')}"></span> €
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div> </div>
    </div>
</div>

</body>
</html>
