<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Habitax | Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; }
        .logo-habitax { color: #ff6b10; font-family: 'Times New Roman', serif; font-weight: bold; font-size: 3rem; }
        .card-login { background: white; border-radius: 20px; padding: 3rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-orange { background: #ff6b10; color: white; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            <h1 class="logo-habitax mb-4">HABITAX</h1>
            <div class="card-login">
                <h4 class="mb-4 text-dark">Identifícate</h4>
                <div th:if="${error}" class="alert alert-danger p-2 small" th:text="${error}"></div>
                <div th:if="${mensajeExito}" class="alert alert-success p-2 small" th:text="${mensajeExito}"></div>
                <form th:action="@{/login}" method="post">
                    <input type="email" name="email" class="form-control mb-3" placeholder="Correo electrónico" required>
                    <input type="password" name="password" class="form-control mb-3" placeholder="Contraseña" required>
                    <button type="submit" class="btn btn-orange w-100 p-3">ENTRAR</button>
                </form>
                <p class="mt-4 mb-0 small">¿No tienes cuenta? <a href="/registro" class="text-orange" style="color:#ff6b10">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
