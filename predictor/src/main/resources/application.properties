# ============================================================
# Habitax - Spring Boot configuration
# ============================================================

server.port=${SERVER_PORT:8081}
spring.application.name=predictor

# ------------------------------------------------------------
# Datasource (MySQL on AWS RDS)
# Variables are set in Elastic Beanstalk:
#   Configuration -> Software -> Environment properties
# Falls back to in-memory H2 for local development.
# ------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:habitax;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ------------------------------------------------------------
# Connection pool (HikariCP, Spring Boot default)
# ------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ------------------------------------------------------------
# External APIs (RapidAPI - Idealista)
# The key is loaded from environment variable RAPIDAPI_KEY.
# NEVER put the real key in this file or in the repository.
# ------------------------------------------------------------
rapidapi.key=${RAPIDAPI_KEY:}
rapidapi.host=${RAPIDAPI_HOST:idealista7.p.rapidapi.com}

# ------------------------------------------------------------
# Actuator: health check endpoint for Elastic Beanstalk.
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ------------------------------------------------------------
# Disable H2 console (we do not want it exposed in production)
# ------------------------------------------------------------
spring.h2.console.enabled=false