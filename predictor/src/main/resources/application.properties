# ============================================================
# Habitax - Spring Boot configuration
# ============================================================
# Comportamiento automatico:
#
# - Si hay variables de entorno (SPRING_DATASOURCE_URL, etc.)
#   -> la app usa MySQL RDS (produccion, o desarrollo con source ~/habitax-env.sh)
#
# - Si NO hay variables de entorno
#   -> la app usa H2 en memoria, creando las tablas automaticamente.
#   -> Ideal para desarrollo: clonar repo + ejecutar en IDE = funciona.
#
# En produccion (Elastic Beanstalk) la variable JPA_DDL_AUTO=validate
# garantiza que Hibernate NO modifica el esquema real de RDS.
# ============================================================

spring.application.name=predictor
server.port=${SERVER_PORT:8081}

# ------------------------------------------------------------
# Datasource
# Los valores por defecto (despues de ':') aplican solo si la variable
# correspondiente no esta definida en el entorno.
# ------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:habitax;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# ------------------------------------------------------------
# JPA / Hibernate
# - Por defecto 'create': ideal para H2 local (crea tablas al arrancar).
# - En EB esta JPA_DDL_AUTO=validate, que protege el esquema real.
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ------------------------------------------------------------
# Pool de conexiones (HikariCP)
# ------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ------------------------------------------------------------
# API externa (RapidAPI - Idealista)
# Si no hay RAPIDAPI_KEY, las llamadas fallan y la app usa
# el precio de fallback definido en el controlador.
# ------------------------------------------------------------
rapidapi.key=${RAPIDAPI_KEY:f6d6ea3df2msh6e78596b39fbc81p1aa67ejsnb83fc12344e5}
rapidapi.host=${RAPIDAPI_HOST:idealista7.p.rapidapi.com}

# ------------------------------------------------------------
# Consola H2 (util en desarrollo local)
# URL:       http://localhost:8081/h2-console
# JDBC URL:  jdbc:h2:mem:habitax
# User:      sa
# Password:  (vacio)
# ------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ------------------------------------------------------------
# Actuator health (Elastic Beanstalk lo usa para health checks)
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized